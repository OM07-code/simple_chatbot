<!doctype html>
<html>
  <head>
    <title>NIRVANA - Your Mental Health Companion</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^0.14.2",
          "marked": "https://esm.sh/marked@^13.0.1"
        }
      }
    </script>
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <main>
      <header>
        <div class="header-text">
          <h1>NIRVANA</h1>
          <p>Your compassionate AI companion</p>
        </div>
        <div class="header-controls">
          <button id="journal-button" type="button" aria-label="Open journal">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"
              />
            </svg>
          </button>
        </div>
      </header>
      <div id="chat-container">
        <!-- Chat messages will be appended here -->
      </div>
      <form id="chat-form">
        <input
          type="text"
          id="chat-input"
          placeholder="Talk about what's on your mind..."
          aria-label="Your message"
          autocomplete="off"
        />
        <button type="submit" aria-label="Send message">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </form>
      <div id="journal-modal" class="modal-overlay" hidden>
        <div class="modal-content">
          <div class="modal-header">
            <h2>Saved Thoughts</h2>
            <button
              id="journal-close-button"
              type="button"
              aria-label="Close journal"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                width="24"
                height="24"
              >
                <path
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
                />
              </svg>
            </button>
          </div>
          <div id="journal-entries">
            <!-- Saved messages will be appended here -->
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
